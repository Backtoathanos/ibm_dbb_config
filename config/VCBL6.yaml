#
# VCBL6 processor override for COBOL.yaml
# Steps: Create listing and save listing; Create LNKCTL, run LNK, save LNKLST; Store LNKLST, CMPLST, CATLST
#

version: 1.0.2
tasks:
  - language: Cobol
    variables:
      - name: processorName
        value: VCBL6
    datasets:
      - name: ${HLQ}.LINK
        options: "cyl space(1,1) lrecl(80) dsorg(PO) recfm(F,B) dsntype(library)"
    steps:
      # Create LNKCTL member (link control input for LNK step). Copy from workspace .lnk/.lnctl if present; else provide via task script per shop.
      - step: createLNKCTL
        type: copy
        target: //'${HLQ}.LINK(${MEMBER})'
        dependencyCopy:
          - search: search:${WORKSPACE}/?path=**/*.lnk
            mappings:
              - source: "*/"
                dataset: ${HLQ}.LINK
          - search: search:${WORKSPACE}/?path=**/*.lnctl
            mappings:
              - source: "*/"
                dataset: ${HLQ}.LINK
      # Run LNK (link-edit from LNKCTL). LNKLST saved to log below.
      - step: runLNK
        type: mvs
        pgm: IEWL
        parm: ${linkEditParms}
        maxRC: 0
        dds:
          - { name: "SYSLIN", dsn: "${HLQ}.LINK(${MEMBER})", options: "shr" }
          - { name: "SYSLMOD", dsn: "${HLQ}.COBOL.LOAD(${MEMBER})", options: "shr", output: true, deployType: "LOAD", scan: "${scanLoadModule}" }
          - { name: "SYSPRINT", log: "${LOGS}/${STEP}-${FILE_NAME}.log", logEncoding: "${LOG_ENCODING}", options: "cyl space(5,5) unit(vio) blksize(133) lrecl(133) recfm(f,b) new" }
          - { name: "SYSUT1", options: "cyl space(5,5) unit(vio) blksize(80) lrecl(80) recfm(f,b) new" }
          - { name: "SYSLIB", dsn: "${HLQ}.COBOL.OBJ", options: "shr" }
          - { dsn: "${SCEELKED}", options: "shr" }
          - { dsn: "${SDFHLOAD}", condition: "${IS_CICS}", options: "shr" }
          - { dsn: "${SDSNLOAD}", condition: "${IS_SQL}", options: "shr" }
      # LNKLST = ${LOGS}/runLNK-${FILE_NAME}.log; CMPLST = ${LOGS}/compile-${FILE_NAME}.log; CATLST = catalog listing if used.
      # Store is achieved by writing all listings to ${LOGS}; CI (e.g. GitHub Actions) archives ${LOGS} as artifacts.
